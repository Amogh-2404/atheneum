<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Book shape -->
  <rect x="6" y="4" width="36" height="40" rx="3" fill="#0a0e17" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Spine -->
  <rect x="6" y="4" width="6" height="40" rx="3" fill="#111827"/>
  <line x1="12" y1="4" x2="12" y2="44" stroke="#1e293b" stroke-width="1"/>
  <!-- Pages edge -->
  <rect x="13" y="6" width="27" height="36" rx="1" fill="#111827" opacity="0.5"/>
  <!-- Open page -->
  <rect x="14" y="7" width="26" height="34" rx="1" fill="#1a1a2e"/>
  <!-- Ruled lines on page -->
  <line x1="16" y1="14" x2="38" y2="14" stroke="#52FEFE" stroke-width="0.5" opacity="0.2"/>
  <line x1="16" y1="18" x2="38" y2="18" stroke="#52FEFE" stroke-width="0.5" opacity="0.2"/>
  <line x1="16" y1="22" x2="38" y2="22" stroke="#52FEFE" stroke-width="0.5" opacity="0.2"/>
  <line x1="16" y1="26" x2="38" y2="26" stroke="#52FEFE" stroke-width="0.5" opacity="0.2"/>
  <line x1="16" y1="30" x2="38" y2="30" stroke="#52FEFE" stroke-width="0.5" opacity="0.2"/>
  <line x1="16" y1="34" x2="38" y2="34" stroke="#52FEFE" stroke-width="0.5" opacity="0.2"/>
  <!-- Margin line -->
  <line x1="19" y1="7" x2="19" y2="41" stroke="#dc2626" stroke-width="0.5" opacity="0.3"/>
  <!-- "C" letter in cyan -->
  <text x="27" y="28" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#52FEFE" text-anchor="middle" dominant-baseline="central">C</text>
  <!-- Subtle glow -->
  <circle cx="27" cy="26" r="8" fill="#52FEFE" opacity="0.05"/>
</svg>
